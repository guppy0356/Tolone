openapi: 3.1.0
info:
  title: Blog API
  version: 0.1.0

paths:
  /api/blogs:
    get:
      operationId: getBlogs
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogInput"
      responses:
        "201":
          description: Created blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /api/blogs/{id}:
    get:
      operationId: getBlog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found

components:
  schemas:
    BlogPost:
      type: object
      required: [id, title, content, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateBlogInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        content:
          type: string
